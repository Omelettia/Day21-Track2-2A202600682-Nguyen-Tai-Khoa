name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          MLFLOW_TRACKING_URI: file:///tmp/mlruns
        run: python -m pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/aws-creds.json
          echo "AWS_ACCESS_KEY_ID=$(python -c "import json; print(json.load(open('/tmp/aws-creds.json'))['aws_access_key_id'])")" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(python -c "import json; print(json.load(open('/tmp/aws-creds.json'))['aws_secret_access_key'])")" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: file:///tmp/mlruns
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3, os
          s3 = boto3.client("s3", region_name="ap-southeast-1")
          bucket = os.environ["CLOUD_BUCKET"]
          s3.upload_file("models/model.pkl", bucket, "models/latest/model.pkl")
          print(f"Uploaded to s3://{bucket}/models/latest/model.pkl")
          EOF

      - name: Save metrics and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            outputs/metrics.json
            outputs/report.txt

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python3 - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Cancelling deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Proceeding to deploy.")
          EOF

      - name: Authenticate to AWS
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/aws-creds.json
          echo "AWS_ACCESS_KEY_ID=$(python3 -c "import json; print(json.load(open('/tmp/aws-creds.json'))['aws_access_key_id'])")" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(python3 -c "import json; print(json.load(open('/tmp/aws-creds.json'))['aws_secret_access_key'])")" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: Check rollback gate
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python3 - <<'EOF'
          import subprocess, json, os, sys

          new_acc = float("${{ needs.train.outputs.accuracy }}")
          bucket = os.environ["CLOUD_BUCKET"]

          result = subprocess.run(
              ["aws", "s3", "cp", f"s3://{bucket}/metrics/latest/metrics.json", "/tmp/prev_metrics.json"],
              capture_output=True,
          )
          if result.returncode == 0:
              with open("/tmp/prev_metrics.json") as f:
                  prev_acc = json.load(f)["accuracy"]
              print(f"Previous accuracy: {prev_acc:.4f} | New accuracy: {new_acc:.4f}")
              if new_acc < prev_acc:
                  raise SystemExit(f"ROLLBACK: new accuracy {new_acc:.4f} < previous {prev_acc:.4f}. Aborting deploy.")
              print(f"APPROVED: new model ({new_acc:.4f}) >= previous ({prev_acc:.4f}). Deploying.")
          else:
              print("No previous baseline found on S3. Skipping rollback check.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: Download metrics artifact
        uses: actions/download-artifact@v4
        with:
          name: metrics
          path: outputs/

      - name: Authenticate to AWS
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/aws-creds.json
          echo "AWS_ACCESS_KEY_ID=$(python3 -c "import json; print(json.load(open('/tmp/aws-creds.json'))['aws_access_key_id'])")" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(python3 -c "import json; print(json.load(open('/tmp/aws-creds.json'))['aws_secret_access_key'])")" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              echo "Attempt $i/15 failed, retrying in 2s..."
              sleep 2
            done
            echo "Health check failed after 15 attempts."
            sudo systemctl status mlops-serve
            sudo journalctl -u mlops-serve -n 50
            exit 1

      - name: Save metrics as new baseline
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          aws s3 cp outputs/metrics.json "s3://$CLOUD_BUCKET/metrics/latest/metrics.json"
          echo "Baseline updated: s3://$CLOUD_BUCKET/metrics/latest/metrics.json"
